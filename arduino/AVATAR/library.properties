sentence=Lightweight typed serial link (bool/int/float/string) for Arduino/ESP32 using Google Protobuf and COBS framing.
paragraph=Full-duplex, self-describing field messaging between a host and an Arduino/ESP32 over serial. Fields are addressed by numeric IDs and carry bool, int, float, or string values. Uses COBS framing over a protobuf-style tag/length/value stream. Header-only.
